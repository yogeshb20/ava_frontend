    #feedback-section {

    }

      .feedback-section,
      .admin-section {
        background: #fff;
        padding: 20px;
        margin-top: 20px;
      }

        width: 100%;
        border-collapse: collapse;
      }

      .feedback-table th,

  <body>
    <div class="chatbot-header" id="chat-header">
      <img src="clarion_logo_bg.svg" alt="Clarion Logo" class="logo" />
    </div>

    <div id="feedback-section" class="feedback-section"></div>
    <div id="team-feedback-section" class="admin-section"></div>
    <div class="chat-body" id="chat-body"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      const { useState, useEffect, useRef } = React;
      const BASE_URL = "http://127.0.0.1:8000";

      function FeedbackApp() {
        const [range, setRange] = useState("7");
        const [filtered, setFiltered] = useState([]);
        const chartRef = useRef(null);
        const chartInstance = useRef(null);

        useEffect(() => {
          async function fetchData() {
            try {
              const resp = await fetch(`${BASE_URL}/filtered-feedbacks?days=${range}`);
              if (!resp.ok) throw new Error("Failed to fetch");
              const data = await resp.json();
              setFiltered(data);
            } catch (err) {
              console.error("Error fetching feedback:", err);
              setFiltered([]);
            }
          }
          fetchData();
        }, [range]);

        useEffect(() => {
          if (!chartRef.current) return;

          if (chartInstance.current) {
            chartInstance.current.destroy();
          }

          const sentimentCategories = ['Positive', 'Neutral', 'Challenging'];
          const counts = { Positive: 0, Neutral: 0, Challenging: 0 };
          const namesMap = { Positive: [], Neutral: [], Challenging: [] };

          filtered.forEach((r) => {
            const sentiment = r.sentiment;
            const name = r.client_name || "Unnamed";
            counts[sentiment] = (counts[sentiment] || 0) + 1;
            namesMap[sentiment].push(name);
          });

          const dataCounts = Object.values(counts);
          const total = dataCounts.reduce((a, b) => a + b, 0);

          const ctx = chartRef.current.getContext("2d");
          chartInstance.current = new Chart(ctx, {
            type: "pie",
            data: {
              labels: sentimentCategories,
              datasets: [
                {
                  data: dataCounts,
                  backgroundColor: ["#82ca9d", "#8884d8", "#ff8042"],
                },
              ],
            },
            options: {
              responsive: true,
              plugins: {
                legend: {
                  position: "bottom",
                },
                tooltip: {
                  callbacks: {
                    label: (tooltipItem) => {
                      const label = tooltipItem.label;
                      const value = tooltipItem.raw;
                      const percentage = total ? ((value / total) * 100).toFixed(1) : 0;
                      const nameLines = namesMap[label].map(name => `• ${name}`);
                      return [
                        `${label}: ${value} (${percentage}%)`,
                        "Clients:",
                        ...nameLines
                      ];
                    },
                  },
                },
              },
            },
          });
        }, [filtered]);

        return React.createElement(
          "div",
          null,
          React.createElement(
            "div",
            { className: "filter-container" },
            React.createElement(
              "select",
              { value: range, onChange: (e) => setRange(e.target.value) },
              React.createElement("option", { value: "7" }, "Last 7 days"),
              React.createElement("option", { value: "30" }, "1 month"),
              React.createElement("option", { value: "90" }, "3 months"),
              React.createElement("option", { value: "180" }, "6 months")
            )
          ),
          filtered.length === 0
            ? React.createElement("div", { className: "empty" }, "No feedback data available.")
            : React.createElement(
                "div",
                { style: { width: "300px", height: "300px" } },
                React.createElement("canvas", { ref: chartRef })
              )
        );
      }

      function TeamFeedbackApp() {
        const [rows, setRows] = useState([]);
        const [clientFilter, setClientFilter] = useState("");
        const [ratingFilter, setRatingFilter] = useState("");

        useEffect(() => {
          async function fetchData() {
            try {
              const resp = await fetch(`${BASE_URL}/team-feedbacks`);
              if (!resp.ok) throw new Error("Failed to fetch");
              const data = await resp.json();
              setRows(data);
            } catch (err) {
              console.error("Error fetching team feedback:", err);
              setRows([]);
            }
          }
          fetchData();
        }, []);

        return React.createElement(
          "div",
          null,
          rows.length === 0
            ? React.createElement("div", { className: "empty" }, "No team feedback data.")
            : React.createElement(
                "table",
                { className: "feedback-table" },
                React.createElement(
                  "thead",
                  null,
                  React.createElement(
                    "tr",
                    null,
                    ["Client Name", "Project Name", "Employee Name", "Rating", "Strengths", "Areas for Improvement"].map(h =>
                      React.createElement("th", null, h)
                    )
                  ),
                  React.createElement(
                    "tr",
                    { className: "filter-row" },
                    React.createElement("th", null,
                      React.createElement("input", {
                        value: clientFilter,
                        onChange: (e) => setClientFilter(e.target.value),
                        placeholder: "Filter"
                      })
                    ),
                    React.createElement("th", null),
                    React.createElement("th", null),
                    React.createElement("th", null,
                      React.createElement("select", {
                        value: ratingFilter,
                        onChange: (e) => setRatingFilter(e.target.value)
                      },
                        React.createElement("option", { value: "" }, "All"),
                        [1, 2, 3, 4, 5].map(n =>
                          React.createElement("option", { key: n, value: n }, n)
                        )
                      )
                    ),
                    React.createElement("th", null),
                    React.createElement("th", null)
                  )
                ),
                React.createElement(
                  "tbody",
                  null,
                  rows
                    .filter(row =>
                      (clientFilter === "" || (row.client_name || "").toLowerCase().includes(clientFilter.toLowerCase())) &&
                      (ratingFilter === "" || String(row.rating || "") === String(ratingFilter))
                    )
                    .map((r, i) =>
                      React.createElement("tr", { key: i },
                        React.createElement("td", null, r.client_name || "Unnamed"),
                        React.createElement("td", null, r.project_name || ""),
                        React.createElement("td", null, r.employee_name || ""),
                        React.createElement("td", null, r.rating || ""),
                        React.createElement("td", null, r.strengths || ""),
                        React.createElement("td", null, r.areas_for_improvement || "")
                      )
                    )
                )
              )
        );
      }

      ReactDOM.createRoot(document.getElementById("feedback-section")).render(
        React.createElement(FeedbackApp)
      );

      ReactDOM.createRoot(document.getElementById("team-feedback-section")).render(
        React.createElement(TeamFeedbackApp)
      );
    </script>
